name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }} / baconjs ${{ matrix.baconjs }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        baconjs: ['1.0.1', '3.0.23']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pin baconjs to ${{ matrix.baconjs }}
        run: npm install --no-save baconjs@${{ matrix.baconjs }}

      - name: Check formatting
        if: matrix.baconjs == '3.0.23'
        run: npm run prettier:check

      - name: Run tests
        if: matrix.node-version != '24.x' || matrix.baconjs != '3.0.23'
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == '24.x' && matrix.baconjs == '3.0.23'
        shell: bash
        run: |
          set -eo pipefail
          npm run coverage | tee coverage.log

      - name: Coverage step summary
        if: matrix.node-version == '24.x' && matrix.baconjs == '3.0.23'
        shell: bash
        run: |
          {
            echo '## Test Coverage'
            echo
            echo '```'
            cat coverage.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage (lcov) as artifact
        if: matrix.node-version == '24.x' && matrix.baconjs == '3.0.23'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 30
