version: 2
updates:
  # npm: weekly bumps, groups minor+patch into one PR, majors individual
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # cubic-spline 2.x switched from a function call (spline(x, xs, ys))
      # to a constructor + .at(x) method. calcs/tankVolume.js still uses
      # the v1 form and has no test coverage. Re-enable after refactoring
      # tankVolume.js and adding a test for the spline call.
      - dependency-name: cubic-spline
        update-types:
          - version-update:semver-major
    labels:
      - dependencies

  # GitHub Actions: monthly, one grouped PR for everything
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - minor
          - patch
          - major
    labels:
      - dependencies
